    priority: P1

  - id: "22"
    name: 从客户信息到销售成交的 AI 跟进工作流
    category: 职能支持
    role: 销售、客户经理
    scene: 有一个新客户线索，需要完成从初次接触到成交的完整跟进
    output: 沟通策略 + 跟进话术 + 异议处理脚本 + 成交复盘
    nodes:
      - 客户画像专家
      - 沟通策略专家
      - 话术生成专家
      - 异议处理专家
      - 复盘分析专家
    chapter: 23-sales-followup
