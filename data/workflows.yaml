  - id: "23"
    name: 从用户投诉到问题闭环的 AI 客服工作流
    category: 职能支持
    role: 客服人员、运营专员
    scene: 接到用户投诉，需要从情绪安抚到问题解决到后续跟进
    output: 回复模板 + 问题定位报告 + 升级策略 + 改进建议
    nodes:
      - 情绪识别专家
      - 问题定位专家
      - 回复生成专家
      - 升级判断专家
      - 改进建议专家
    chapter: 24-customer-service
    priority: P2

  - id: "24"
    name: 从票据到报销申请的 AI 财务工作流
    category: 职能支持
    role: 财务专员、行政
    scene: 需要整理一批报销票据并提交规范的报销申请
    output: 报销清单 + 异常检查报告 + 说明文案
    nodes:
      - 票据分类专家
      - 合规检查专家
      - 清单生成专家
      - 异常说明专家
      - 审批文案专家
    chapter: 25-expense-reimbursement
    priority: P2

  - id: "25"
    name: 从合同文本到风险清单的 AI 法务初审工作流
    category: 职能支持
    role: 法务、合同管理员、创业者
    scene: 收到合同文本，需要快速完成初步风险审查
    output: 风险条款清单 + 修改建议 + 问题清单
    nodes:
      - 合同结构分析专家
      - 风险条款识别专家
      - 修改建议专家
      - 问题清单专家
    chapter: 26-legal-review
    priority: P2

