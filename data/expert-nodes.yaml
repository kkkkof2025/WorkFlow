expert_nodes:

  content_creation:
    - name: 选题判断专家
      role: 评估内容选题的传播潜力和适配性
      input: 关键词、热点话题、平台类型
      output: 选题方向 + 情绪标签 + 目标人群
      used_in: ["01", "02"]

    - name: 故事选取专家
      role: 从多个故事素材中筛选最适合视频化的故事
      input: 选题方向 + 情绪标签 + 候选故事列表
      output: 选定故事 + 选择理由 + 改编方向
      used_in: ["01"]

    - name: 故事扩写专家
      role: 将一句话故事扩写成有结构的完整短视频故事
      input: 选定故事 + 改编方向
      output: 完整故事文本（含开头钩子、冲突、转折、结尾）
      used_in: ["01"]

    - name: 脚本生成专家
      role: 将故事文本转化为可拍摄的分段脚本
      input: 完整故事文本
      output: 分段脚本（含台词、画面描述、时长建议）
      used_in: ["01"]

    - name: 分镜设计专家
      role: 将脚本转化为具体的镜头语言和分镜说明
      input: 分段脚本
      output: 分镜表（含镜号、景别、运动方式、画面内容）
      used_in: ["01", "06"]

    - name: 图像生成提示词专家
      role: 为每个分镜生成可用于 AI 图像工具的提示词
      input: 分镜表
      output: 每个分镜对应的 Midjourney/SD 提示词
      used_in: ["01", "05", "07"]

    - name: 视频生成提示词专家
      role: 将图像提示词和分镜说明转化为视频生成提示词
      input: 分镜表 + 图像提示词
      output: 每段视频的 Sora/Kling/即梦提示词
      used_in: ["01", "05"]

    - name: 配音文案专家
      role: 将脚本转化为适合 TTS 朗读的配音文案
      input: 分段脚本
      output: 配音文案（含停顿标记、情绪标注）
      used_in: ["01"]

    - name: 字幕包装专家
      role: 生成视频字幕和封面文案
      input: 配音文案 + 视频主题
      output: 字幕文件内容 + 封面文案选项
      used_in: ["01"]

    - name: 发布复盘专家
      role: 生成发布标题、标签、发布时间建议，并设计复盘框架
      input: 完整内容包 + 平台信息
      output: 发布标题组 + 话题标签 + 复盘清单
      used_in: ["01"]

  project_management:
    - name: 需求澄清专家
      role: 将模糊需求转化为清晰的需求陈述
      input: 原始需求文本（邮件、会议记录、口头说明）
      output: 需求陈述清单（含背景、目标、约束条件）
      used_in: ["09"]

    - name: 干系人识别专家
      role: 识别项目相关的所有干系人及其关注点
      input: 需求陈述清单
      output: 干系人清单（含角色、关注点、影响程度）
      used_in: ["09"]

    - name: 任务拆解专家
      role: 将需求拆解为可执行的具体任务
      input: 需求陈述清单 + 干系人清单
      output: 任务清单（含任务名、负责人、依赖关系）
      used_in: ["09"]

    - name: 风险识别专家
      role: 识别项目执行中的潜在风险
      input: 任务清单 + 资源信息
      output: 风险清单（含风险描述、概率、影响、应对措施）
      used_in: ["09"]

    - name: 排期规划专家
      role: 基于任务清单和资源生成排期计划
      input: 任务清单 + 风险清单 + 资源信息
      output: 项目排期表（甘特图文字版）
      used_in: ["09"]

    - name: 资源评估专家
      role: 评估项目所需的人力、时间、工具资源
      input: 任务清单 + 排期计划
      output: 资源需求报告
      used_in: ["09"]

    - name: 沟通计划专家
      role: 设计项目沟通机制和报告节奏
      input: 干系人清单 + 排期计划
      output: 沟通计划（含会议节奏、报告格式、升级机制）
      used_in: ["09"]

    - name: 项目复盘专家
      role: 设计项目复盘框架和复盘问题
      input: 项目目标 + 完成情况
      output: 复盘报告模板 + 关键问题清单
      used_in: ["09"]

  union_activity:
    - name: 活动素材整理专家
      role: 将散乱的活动素材整理成结构化的素材包
      input: 活动照片说明、采访记录、活动方案、参与人员信息
      output: 结构化素材包（时间线 + 人物列表 + 关键事件）
      used_in: ["26"]

    - name: 人物故事挖掘专家
      role: 从素材中发现有价值的人物故事线索
      input: 结构化素材包
      output: 人物故事提案（含人物、背景、变化、细节）
      used_in: ["26"]

    - name: 情绪主线设计专家
      role: 确定宣传内容的情绪主线和叙事角度
      input: 人物故事提案
      output: 情绪主线方案（含主情绪、叙事角度、核心金句方向）
      used_in: ["26"]

    - name: 新闻稿生成专家
      role: 生成规范的活动新闻稿
      input: 结构化素材包 + 情绪主线方案
      output: 新闻稿（800 字左右，含导语、主体、结语）
      used_in: ["26"]

    - name: 短视频脚本专家
      role: 生成适合工会宣传的短视频脚本
      input: 人物故事提案 + 情绪主线方案
      output: 60 秒短视频脚本（含画面、台词、情绪节奏）
      used_in: ["26"]

    - name: 标题与金句专家
      role: 生成发布标题和宣传金句
      input: 新闻稿 + 短视频脚本
      output: 标题组（5 条）+ 金句组（3 条）
      used_in: ["26"]

    - name: 真实性审查专家
      role: 检查宣传内容是否过于空洞或失真
      input: 新闻稿 + 短视频脚本
      output: 真实性审查报告（含问题清单和修改建议）
      used_in: ["26"]

    - name: 宣传复盘专家
      role: 评估宣传效果并生成改进建议
      input: 发布后的反馈数据或主观评估
      output: 宣传复盘报告 + 下次改进清单
      used_in: ["26"]
